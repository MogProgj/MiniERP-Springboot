services:
  db:
    image: postgres:16-alpine
    container_name: minierp_db
    environment:
      POSTGRES_DB: minierp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - minierp_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d minierp"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  minierp_db_data:
